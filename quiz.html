<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnPro | JS Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen"
  >
    <nav
      class="p-6 bg-white dark:bg-gray-800 shadow-sm flex justify-between items-center"
    >
      <a href="index.html" class="text-2xl font-bold text-yellow-500"
        >LearnPro</a
      >
      <div id="timer" class="text-xl font-mono font-bold text-red-500">
        00:30
      </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-4">
      <div
        id="start-screen"
        class="text-center bg-white dark:bg-gray-800 p-10 rounded-3xl shadow-xl"
      >
        <h2 class="text-4xl font-black mb-4">
          Ready for the <span class="text-yellow-500">JS Sprint?</span>
        </h2>
        <p class="mb-8 text-gray-500">
          10 Questions • 30 Seconds per question • Instant Feedback
        </p>
        <button
          id="start-btn"
          class="bg-yellow-500 text-black px-10 py-4 rounded-2xl font-black text-xl hover:scale-105 transition"
        >
          START QUIZ
        </button>
      </div>

      <div id="quiz-container" class="hidden">
        <div class="mb-6 flex justify-between items-end">
          <div>
            <span
              id="current-count"
              class="text-sm font-bold text-yellow-500 uppercase"
              >Question 1/10</span
            >
            <h2 id="question-text" class="text-2xl font-bold mt-1">
              Loading...
            </h2>
          </div>
          <div class="text-right">
            <p class="text-xs uppercase text-gray-400 font-bold">
              Current Score
            </p>
            <p id="live-score" class="text-2xl font-black">0</p>
          </div>
        </div>

        <div
          id="options-grid"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        ></div>
      </div>

      <div
        id="result-screen"
        class="hidden bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl"
      >
        <div class="text-center mb-10">
          <h2 class="text-5xl font-black mb-2">Finish Line!</h2>
          <p id="final-stats" class="text-xl text-gray-500"></p>
        </div>

        <h3 class="font-bold mb-4 border-b pb-2">Review Your Answers</h3>
        <div id="review-list" class="space-y-3 mb-8"></div>

        <div class="flex gap-4">
          <button
            onclick="location.reload()"
            class="flex-1 bg-yellow-500 text-black font-bold py-4 rounded-xl"
          >
            Try Again
          </button>
          <a
            href="profile.html"
            class="flex-1 bg-gray-100 dark:bg-gray-700 font-bold py-4 rounded-xl text-center"
            >View Profile</a
          >
        </div>
      </div>
    </main>

    <script src="assets/js/quiz.js"></script>
  </body>
</html>
